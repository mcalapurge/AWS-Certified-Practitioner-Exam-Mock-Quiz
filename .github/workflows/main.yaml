name: Build & Deploy Static Site to S3

on:
  push:
    branches: [ "main" ]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: contains(github.event.head_commit.message, '[deploy]')
    runs-on: ubuntu-latest
    environment: MCALAPURGE AWS
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Source markdown lives in two git submodules; the parsers walk them
          # at build time. Without this they'd be empty and the build would
          # fall back to the committed JSON snapshot.
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:             ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --exclude ".DS_Store"

      # When CloudFront caching is enabled, switch to a two-step deploy
      # (long-cache hashed assets, no-cache index.html) and invalidate /index.html.
